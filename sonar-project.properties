# Debe ser único en una instancia de SonarQube
sonar.projectKey=YourProjectKey

# --- propiedades opcionales ---

# Nombre del proyecto que se mostrará en la interfaz de SonarQube
sonar.projectName=Mi Proyecto Backend

# Versión del proyecto
sonar.projectVersion=1.0

# Ruta a los archivos de código fuente
sonar.sources=src

# Ruta a los archivos de prueba
sonar.tests=test

# Codificación del código fuente
sonar.sourceEncoding=UTF-8

# --- Propiedades específicas de Python ---

# Ruta al reporte de cobertura generado por coverage.py
# El workflow de CI debe generar este archivo en formato XML.
sonar.python.coverage.reportPaths=coverage.xml

# --- Configuración para SonarCloud ---
# Reemplaza 'your-organization' con el nombre de tu organización en SonarCloud
sonar.organization=your-organization

# URL del servidor de SonarCloud
sonar.host.url=https://sonarcloud.io


# Excluir carpetas que no son código (como librerías virtuales o temporales)
sonar.exclusions=**/venv/**, **/htmlcov/**, **/.pytest_cache/**