name: Flujo de trabajo de CI/CD para una aplicación Python

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: configurar python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: ejecutar pruebas con unittest
      run: |
        coverage run -m unittest discover -s test

    - name: generar reporte de cobertura
      run: |
        coverage report -m
        coverage html

    - name: Subir artefacto de cobertura
      uses: actions/upload-artifact@v4
      with:
        name: reporte-de-cobertura
        path: htmlcov

    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@master
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Lo da GitHub solo
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Desplegar a Render
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}